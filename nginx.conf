server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    location = /healthz {
        access_log off;
        default_type text/plain;
        charset utf-8;
        add_header Cache-Control "no-store" always;
        return 200 "ok\n";
    }

    # Unqualified /favicon.ico requests (omit explicit <link>; crawlers/probes still hit root)
    location = /favicon.ico {
        alias /usr/share/nginx/html/icons/favicon.ico;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|svg|ico|webp|avif|woff2?)$ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
